version: '3'

services:

  catalog-service:
    build: ./catalog-service
    ports:
      - "3001:3001"

  order-service:
    build: ./order-service
    ports:
      - "3002:3002"
    environment:
      - CATALOG_URL=http://catalog-service:3001
    depends_on:
      - catalog-service

  frontend-service:
    build: ./frontend-service
    ports:
      - "3000:3000"
    environment:    //this is where we set the environment variables for the frontend-service, which will be used to connect to the catalog-service and order-service
      - CATALOG_URL=http://catalog-service:3001
      - ORDER_URL=http://order-service:3002
    depends_on:
      - catalog-service
      - order-service